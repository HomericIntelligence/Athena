# Athena's development environment. Athena itself is distributed only as an AI-harness plugin.

[workspace]
name = "Athena"
description = "Portable workflow skills for Claude Code, Codex, and Pi."
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64"]

[dependencies]
python = ">=3.10,<3.14"
pre-commit = ">=3.0,<5"
markdownlint-cli = ">=0.41,<1"
yamllint = ">=1.35,<2"
check-jsonschema = ">=0.33,<1"
coverage = ">=7.10,<8"
mypy = ">=1.17,<2"
ruff = ">=0.12,<1"
pyyaml = ">=6.0,<7"
types-pyyaml = ">=6.0,<7"

[feature.security.dependencies]
syft = "==1.46.0"
grype = "==0.115.0"

[environments]
security = ["security"]

[tasks]
validate = "python scripts/validate_skills.py"
test = "coverage erase && PYTHONDONTWRITEBYTECODE=1 ATHENA_COVERAGE=1 coverage run --branch --parallel-mode --source=scripts,skills -m unittest discover -s tests -v && coverage combine && coverage json -o coverage.json && python scripts/coverage_policy.py coverage.json --minimum 80 && coverage report --show-missing"
lint = "ruff check scripts tests skills"
format-check = "ruff format --check scripts tests skills"
typecheck = "mypy --strict --explicit-package-bases scripts tests skills/_cli.py skills/*/scripts/*.py"
markdownlint = "markdownlint README.md AGENTS.md CLAUDE.md CONTRIBUTING.md CODE_OF_CONDUCT.md SECURITY.md docs skills"
workflow-lint = "yamllint .github/workflows"
workflow-schema = "check-jsonschema --builtin-schema vendor.github-workflows .github/workflows/*.yml"
package = "python scripts/package_plugin.py"
sbom = "python scripts/generate_sboms.py"
sca = "python scripts/scan_vulnerabilities.py --inventory dist-internal/syft-environment.json"
static = { depends-on = ["lint", "format-check", "typecheck"] }
workflow-check = { depends-on = ["workflow-lint", "workflow-schema"] }
check = { depends-on = ["validate", "test", "static", "markdownlint", "workflow-check"] }
all = { depends-on = ["check", "package"] }
clean = { cmd = "rm -rf dist .coverage .pytest_cache __pycache__ scripts/__pycache__ scripts/policies/__pycache__ skills/__pycache__ skills/*/scripts/__pycache__ tests/__pycache__ tests/unit/__pycache__ tests/fixtures/__pycache__" }
