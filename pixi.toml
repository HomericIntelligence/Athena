# pixi.toml — Athena task environment.
#
# The repo is a plugin/skill distribution; there is no compile step. Tasks
# below gate lint/format/typecheck/test/audit so `just check` matches CI.

[project]
name = "Athena"
version = "0.1.0"
description = "Agent-host plugins and skills imported by Claude Code / Codex / Pi."
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]

[dependencies]
python = ">=3.10,<3.14"

[feature.dev.dependencies]
pytest = ">=9.0,<10"
pytest-cov = ">=7.0,<8"
ruff = ">=0.15,<1"
mypy = ">=1.8.0,<3"
hatchling = ">=1.27.0,<2"
hatch-vcs = ">=0.4.0,<1"
pre-commit = ">=3.0,<5"
pip-audit = ">=2.7,<3"
markdownlint-cli = ">=0.41,<1"
yamllint = ">=1.35,<2"

[feature.automation.dependencies]
# Cross-repo dep. Matches the pin in pyproject.toml [project.dependencies].
# Bumping is a cross-repo coordination event per Odysseus/AGENTS.md.
pydantic = ">=2.12.5,<3"

[environments]
default = { features = ["dev"], solve-group = "default" }
automation = { features = ["dev", "automation"], solve-group = "default" }

# ----------------------------------------------------------------------------
# Tasks
# ----------------------------------------------------------------------------

[tasks]
# Surface `pixi run <task>` wrappers around the recipes in justfile.
# Pre-commit is fully pixi-local so detached-execution tasks can rely on it.

lint = "ruff check athena tests skills"
format = "ruff format athena scripts tests skills"
format-check = "ruff format --check athena scripts tests skills"
typecheck = "mypy --strict athena"
test = "pytest -v --strict-markers"
audit = "pip-audit"
markdownlint = "markdownlint ."
validate-marketplace = "python -m athena.validate_marketplace"

# `just check` exec: lint + format-check + typecheck + test + validate-marketplace.
check = { depends-on = ["lint", "format-check", "typecheck", "validate-marketplace"] }

# Convenience aggregate for CI.
all = { depends-on = ["check", "test", "audit", "markdownlint"] }

# Install the project + dev extras in the active pixi environment.
install = "pip install --no-deps -e .[dev]"

# Clean caches. Used by CI to keep caches bounded.
clean = { cmd = "rm -rf .mypy_cache .ruff_cache .pytest_cache .coverage htmlcov" }
