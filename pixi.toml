# Athena's development environment. Athena itself is distributed only as an AI-harness plugin.

[workspace]
name = "Athena"
description = "Portable workflow skills for Claude Code, Codex, and Pi."
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]

[dependencies]
python = ">=3.10,<3.14"
pre-commit = ">=3.0,<5"
markdownlint-cli = ">=0.41,<1"
yamllint = ">=1.35,<2"
check-jsonschema = ">=0.33,<1"

[tasks]
validate = "python scripts/validate_skills.py"
test = "python -m unittest discover -s tests -v"
markdownlint = "markdownlint README.md AGENTS.md CLAUDE.md CONTRIBUTING.md CODE_OF_CONDUCT.md SECURITY.md docs"
workflow-lint = "yamllint .github/workflows"
workflow-schema = "check-jsonschema --builtin-schema vendor.github-workflows .github/workflows/*.yml"
package = "bash scripts/package-plugin.sh"
check = { depends-on = ["validate", "test", "markdownlint", "workflow-lint", "workflow-schema"] }
all = { depends-on = ["check", "package"] }
clean = { cmd = "rm -rf dist .coverage .pytest_cache __pycache__ scripts/__pycache__ tests/__pycache__" }
