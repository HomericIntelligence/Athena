name: Release

"on":
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: release
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Verify tag and plugin versions
        run: |
          set -euo pipefail
          expected="${GITHUB_REF_NAME#v}"
          python3 scripts/validate_skills.py
          actual=$(python3 -c \
            'import json; print(json.load(open(".codex-plugin/plugin.json"))["version"])')
          test "$expected" = "$actual"
      - name: Run contract tests
        run: python3 -m unittest discover -s tests -v
      - name: Build portable plugin archive
        run: bash scripts/package-plugin.sh
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/athena-plugin-*.tar.gz \
            --generate-notes --verify-tag
