name: Release

"on":
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  preflight:
    name: verify-release-trust
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Verify signed tag and protected-main ancestry
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/ci_policy.py release

  required:
    name: required-checks
    needs: preflight
    permissions:
      contents: read
      issues: read
      pull-requests: read
    uses: ./.github/workflows/_required.yml

  release:
    name: release
    needs: required
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: athena-plugin
          path: dist
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/ci_policy.py publish-release --root dist
