name: Release

"on":
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  preflight:
    name: verify-release-trust
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Verify signed tag and protected-main ancestry
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tag must be an exact vMAJOR.MINOR.PATCH version."
            exit 1
          fi
          tag_ref=$(gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$GITHUB_REF_NAME")
          if [[ $(jq -r '.object.type' <<<"$tag_ref") != tag ]]; then
            echo "::error::Release tag must be annotated and signed."
            exit 1
          fi
          tag_sha=$(jq -r '.object.sha' <<<"$tag_ref")
          tag_object=$(gh api "repos/$GITHUB_REPOSITORY/git/tags/$tag_sha")
          if [[ $(jq -r '.verification.verified' <<<"$tag_object") != true ]]; then
            reason=$(jq -r '.verification.reason // "unknown"' <<<"$tag_object")
            echo "::error::GitHub did not verify the tag signature: $reason"
            exit 1
          fi
          branch=$(gh api "repos/$GITHUB_REPOSITORY/branches/main")
          if [[ $(jq -r '.protected' <<<"$branch") != true ]]; then
            echo "::error::main must be protected before publishing a release."
            exit 1
          fi
          tag_commit=$(jq -r '.object.sha' <<<"$tag_object")
          if [[ "$tag_commit" != "$GITHUB_SHA" ]]; then
            echo "::error::Tag target does not match the workflow commit."
            exit 1
          fi
          if ! git merge-base --is-ancestor "$tag_commit" origin/main; then
            echo "::error::Release tag target must be reachable from protected main."
            exit 1
          fi

  required:
    name: required-checks
    needs: preflight
    permissions:
      contents: read
    uses: ./.github/workflows/_required.yml

  release:
    name: release
    needs: required
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: athena-plugin
          path: dist
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/athena-plugin-*.tar.gz dist/athena-plugin-*.tar.gz.sha256 \
            --generate-notes --verify-tag --repo "$GITHUB_REPOSITORY"
