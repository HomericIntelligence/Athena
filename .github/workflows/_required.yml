name: Required Checks

"on":
  workflow_call:
  merge_group:
    types: [checks_requested]
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "17 9 * * 2"

concurrency:
  group: required-${{ github.workflow }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  forbid-suppressions:
    name: forbid-suppressions
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Reject silent failures and advisory gates
        run: python scripts/ci_policy.py suppressions

  validate:
    name: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.0.0
        with:
          version: "0.10.8"
          enable-cache: true
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0
        with:
          just-version: "1.36.0"
      - name: Install locked test environment
        run: uv sync --locked
      - name: Validate plugin distribution
        run: uv run python scripts/validate_skills.py
      - name: Run contract tests with coverage threshold
        run: just test
      - name: Run lint, format, and type checks
        run: just static

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.0.0
        with:
          version: "0.10.8"
          enable-cache: true
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0
        with:
          just-version: "1.36.0"
      - name: Install locked lint environment
        run: uv sync --locked
      - name: Lint public documentation and skills
        run: just markdownlint

  workflow-schema:
    name: workflow-schema
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.0.0
        with:
          version: "0.10.8"
          enable-cache: true
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0
        with:
          just-version: "1.36.0"
      - name: Install locked validation tools
        run: uv sync --locked
      - name: Validate workflow syntax and schema
        run: just workflow-check

  justfile-check:
    name: justfile-check
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0
        with:
          just-version: "1.36.0"
      - name: Validate task entry points
        run: just ci-entrypoints

  security-secrets-scan:
    name: security/secrets-scan
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Run Gitleaks
        env:
          GITLEAKS_IMAGE: >-
            ghcr.io/gitleaks/gitleaks:v8.30.0@sha256:691af3c7c5a48b16f187ce3446d5f194838f91238f27270ed36eef6359a574d9
        run: >-
          docker run --rm -v "$PWD:/repo:ro" -w /repo "$GITLEAKS_IMAGE"
          detect --source=. --verbose --exit-code=1

  package:
    name: package
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.0.0
        with:
          version: "0.10.8"
          enable-cache: true
      - name: Install locked build environment
        run: uv sync --locked
      - id: syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          syft-version: v1.46.0
      - name: Build portable plugin archive and deterministic SBOMs
        run: |
          uv run python scripts/package_plugin.py
          uv run python scripts/generate_sboms.py --syft "${{ steps.syft.outputs.cmd }}"
          uv run python scripts/generate_sboms.py --syft "${{ steps.syft.outputs.cmd }}" \
            --output dist-reproducibility \
            --native-output dist-internal/syft-environment-reproducibility.json
          cmp dist/athena-plugin-*.spdx.json dist-reproducibility/athena-plugin-*.spdx.json
          cmp dist/athena-plugin-*.spdx.json.sha256 \
            dist-reproducibility/athena-plugin-*.spdx.json.sha256
          cmp dist/athena-build-linux-64-*.spdx.json \
            dist-reproducibility/athena-build-linux-64-*.spdx.json
          cmp dist/athena-build-linux-64-*.spdx.json.sha256 \
            dist-reproducibility/athena-build-linux-64-*.spdx.json.sha256
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: athena-plugin
          path: |
            dist/athena-plugin-*.tar.gz
            dist/athena-plugin-*.tar.gz.sha256
            dist/athena-plugin-*.spdx.json
            dist/athena-plugin-*.spdx.json.sha256
            dist/athena-build-linux-64-*.spdx.json
            dist/athena-build-linux-64-*.spdx.json.sha256
          if-no-files-found: error
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: athena-sca-input
          path: dist-internal/syft-environment.json
          if-no-files-found: error

  security-dependency-scan:
    name: security/dependency-scan
    needs: package
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      issues: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.0.0
        with:
          version: "0.10.8"
          enable-cache: true
      - name: Install locked scan environment
        run: uv sync --locked
      - id: grype
        uses: anchore/scan-action/download-grype@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          grype-version: v0.115.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: athena-sca-input
          path: dist-internal
      - name: Scan dependency inventory and enforce vulnerability policy
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          uv run python scripts/scan_vulnerabilities.py
          --inventory dist-internal/syft-environment.json
          --grype "${{ steps.grype.outputs.cmd }}"
      - name: Retain the full vulnerability report
        if: always() && hashFiles('dist-internal/grype.json') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: athena-grype-report
          path: dist-internal/grype.json
          if-no-files-found: error

  pr-policy:
    name: pr-policy
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    env:
      GH_TOKEN: ${{ github.token }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      REPO_OWNER: ${{ github.repository_owner }}
      REPO_NAME: ${{ github.event.repository.name }}
      PR_AUTHOR: ${{ github.event.pull_request.user.login }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Enforce issue linkage, signatures, DCO, and Conventional Commits
        run: python scripts/ci_policy.py pr-policy

  required-checks-gate:
    name: required-checks-gate
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    if: always()
    needs:
      - forbid-suppressions
      - validate
      - markdownlint
      - workflow-schema
      - justfile-check
      - security-secrets-scan
      - package
      - security-dependency-scan
      - pr-policy
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Verify every required job
        env:
          EVENT_NAME: ${{ github.event_name }}
          RESULTS: ${{ toJSON(needs) }}
        run: python scripts/ci_policy.py required-jobs
