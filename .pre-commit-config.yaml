repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c # v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^skills/
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: check-yaml
      - id: check-json
      - id: check-toml

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: 7339935a3036f096ee0d7f1f047a9ec41707d4c1 # v0.20.0
    hooks:
      - id: markdownlint-cli2
        files: '^(README\.md|AGENTS\.md|CLAUDE\.md|CONTRIBUTING\.md|CODE_OF_CONDUCT\.md|SECURITY\.md|docs/.*\.md)$'

  - repo: local
    hooks:
      - id: athena-validate-skills
        name: validate Athena plugin distribution
        entry: python3 scripts/validate_skills.py
        language: system
        pass_filenames: false
      - id: athena-validator-tests
        name: test Athena distribution validator
        entry: pixi run test
        language: system
        pass_filenames: false
      - id: athena-python-lint
        name: lint Athena repository tooling
        entry: pixi run lint
        language: system
        pass_filenames: false
      - id: athena-python-format
        name: check Athena repository tooling formatting
        entry: pixi run format-check
        language: system
        pass_filenames: false
      - id: athena-python-types
        name: type-check Athena repository tooling
        entry: pixi run typecheck
        language: system
        pass_filenames: false
