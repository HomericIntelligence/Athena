repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c # v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: check-yaml
      - id: check-json
      - id: check-toml

  - repo: local
    hooks:
      - id: athena-validate-skills
        name: validate Athena plugin distribution
        entry: uv run python scripts/validate_skills.py
        language: system
        pass_filenames: false
      - id: athena-markdownlint
        name: lint Athena Markdown
        entry: uv run pymarkdown -d MD013,MD024,MD033,MD041,MD046 scan README.md AGENTS.md CLAUDE.md CONTRIBUTING.md CODE_OF_CONDUCT.md SECURITY.md docs skills
        language: system
        pass_filenames: false
      - id: athena-validator-tests
        name: test Athena distribution validator
        entry: uv run coverage erase && PYTHONDONTWRITEBYTECODE=1 ATHENA_COVERAGE=1 uv run coverage run --branch --parallel-mode --source=scripts,skills -m pytest -q && uv run coverage combine && uv run coverage json -o coverage.json && uv run python scripts/coverage_policy.py coverage.json --minimum 80
        language: system
        pass_filenames: false
      - id: athena-python-lint
        name: lint Athena repository tooling
        entry: uv run ruff check scripts tests skills
        language: system
        pass_filenames: false
      - id: athena-python-format
        name: check Athena repository tooling formatting
        entry: uv run ruff format --check scripts tests skills
        language: system
        pass_filenames: false
      - id: athena-python-types
        name: type-check Athena repository tooling
        entry: uv run mypy --strict --explicit-package-bases scripts tests skills
        language: system
        pass_filenames: false
