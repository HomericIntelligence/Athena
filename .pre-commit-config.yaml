repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^skills/
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: check-yaml
      - id: check-json
      - id: check-toml

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.20.0
    hooks:
      - id: markdownlint-cli2
        files: '^(README\.md|AGENTS\.md|CLAUDE\.md|CONTRIBUTING\.md|CODE_OF_CONDUCT\.md|SECURITY\.md|docs/.*\.md)$'

  - repo: local
    hooks:
      - id: athena-validate-skills
        name: validate Athena plugin distribution
        entry: python3 scripts/validate_skills.py
        language: system
        pass_filenames: false
      - id: athena-validator-tests
        name: test Athena distribution validator
        entry: python3 -m unittest discover -s tests -v
        language: system
        pass_filenames: false
