---
# markdownlint config — mirrors Hephaestus's defaults.
# Long lines are accepted in skill bodies (embedded agent prompts).
default: true

MD013: false   # line-length
MD024: false   # no-duplicate-heading
MD041: false   # first-line-h1 (skill docs intentionally do not start with H1)
MD033: false   # no-inline-html (skill bodies legitimately use HTML)
MD046: false   # code-block-style (skills mix fenced + indented deliberately)

# Project-specific allow-list: leave the canonical rule set above for SKILL.md
# bodies; tighten on README.md and CONTRIBUTING.md via per-file overrides.
MD012: true    # no-blanks-blockquote (always)
MD009: true    # no-trailing-spaces
MD030: true    # spaces-after-list-markers
MD031: true    # blanks-around-fences
MD040: true    # fenced-code-language
